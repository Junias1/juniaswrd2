services:
  - type: web
    name: juniaswrld-md
    runtime: docker
    dockerfilePath: lib/Dockerfile
    envVars:
      - key: SESSION_ID
        value: ""
      - key: OWNER_NUMBER
        value: "2348133648302"
      - key: BOT_NAME
        value: "Juniaswrld-MD"
      - key: COMMAND_MODE
        value: "public"
      - key: TIMEZONE
        value: "Africa/Lagos"
      - key: MONGO_URL
        value: ""
      - key: POSTGRES_URL
        value: ""
      - key: MYSQL_URL
        value: ""
      - key: DB_URL
        value: ""
    startCommand: npm run start:optimized
